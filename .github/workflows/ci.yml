name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ShotCaller.sln

      - name: Build
        run: dotnet build ShotCaller.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/ShotCaller.Tests/ShotCaller.Tests.csproj --no-build --configuration Release --verbosity normal